<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아라's Teacher Timer</title>

<style>
/* ================= ANIMATIONS ================= */
.falling-emoji {
  position: fixed;
  top: -50px;
  z-index: 9999;
  pointer-events: none;
  font-size: 24px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* ================= THEME & LAYOUT ================= */
body {
  background: #fdfaf6;
  font-family: 'Malgun Gothic', Arial;
  color: #a67c52;
  text-align: center;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}
h2 { margin: 10px 0; cursor: pointer; color: #a67c52; }
#clockBox { margin: auto; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; }
canvas { background: white; border-radius: 50%; box-shadow: 0 0 20px rgba(166, 124, 82, 0.1); border: 8px solid #f2e8df; }

#periodLabel { font-size: 22px; font-weight: bold; margin-top: 10px; }
#info { margin-top: 20px; font-size: 18px; color: #8e9775; }

table {
  margin: auto; margin-top: 20px; border-collapse: collapse; width: 95%; max-width: 400px; 
  background: white; border-radius: 15px; overflow: hidden;
}
th, td { padding: 10px; border-bottom: 1px solid #fdfaf6; }
th { color: white; background: #eaddcf; }

.currentClass { background: #faf3ef !important; box-shadow: 0 0 15px rgba(166, 124, 82, 0.1); font-weight: bold; }
.prepPeriod { color: #8e9775 !important; } 
.lunchText { color: #e07a5f; font-weight: bold; }
.periodTime { font-size: 10px; color: #ccc; margin-right: 5px; display: none; }
#scheduleTable td:hover .periodTime { display: inline; }

#weekPopup {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(253, 250, 246, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000;
}
#weekBox {
  background: white; padding: 20px; border-radius: 20px; width: 95%; max-width: 600px;
  border: 4px solid #f2e8df; color: #a67c52;
}
#weekTable { width: 100%; border-collapse: collapse; text-align: center; }
#weekTable th { background: #f2e8df; color: #a67c52; padding: 8px; }
#weekTable td { padding: 10px; border-top: 1px solid #fdfaf6; font-size: 13px; }
</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="periodLabel"></div>

<div id="info">
<div id="weather">날씨 불러오는 중...</div>
<div id="air">미세먼지 불러오는 중...</div>
</div>

<table id="scheduleTable">
<tr><th>교시</th><th>과목</th></tr>
</table>

<div id="weekPopup">
<div id="weekBox">
<h3>🕊️ 4학년 주간 시간표 🕊️</h3>
<table id="weekTable">
<tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
<tr><td>1교시</td><td>체육</td><td>국어</td><td>수학</td><td>수학</td><td>영어</td></tr>
<tr><td>2교시</td><td>국어</td><td>국어</td><td>국어</td><td>영어</td><td>국어</td></tr>
<tr><td>3교시</td><td>수학</td><td>음악</td><td>도덕</td><td>사회</td><td>수학</td></tr>
<tr><td>4교시</td><td>사회</td><td>과학</td><td>체육</td><td>미술</td><td>과학</td></tr>
<tr><td>5교시</td><td>사회</td><td>창체</td><td>음악</td><td>미술</td><td>과학</td></tr>
<tr><td>6교시</td><td>-</td><td>-</td><td>-</td><td>창체</td><td>-</td></tr>
</table>
</div>
</div>

<script>
const API_KEY="fa9fe37b9be14839fe6774643939e974";
let currentCondition = "default"; 

const schedule = {
  Monday: ["체육", "국어", "수학", "사회", "사회", null],
  Tuesday: ["국어", "국어", "음악", "과학", "창체", null],
  Wednesday: ["수학", "국어", "도덕", "체육", "음악", null],
  Thursday: ["수학", "영어", "사회", "미술", "미술", "창체"],
  Friday: ["영어", "국어", "수학", "과학", "과학", null]
};

const dayNames = {
  Monday: "월요일", Tuesday: "화요일", Wednesday: "수요일",
  Thursday: "목요일", Friday: "금요일", Saturday: "토요일", Sunday: "일요일"
};

const now = new Date();
const todayEn = now.toLocaleDateString('en-US', { weekday: 'long' });
const currentMinsTotal = now.getHours() * 60 + now.getMinutes();

document.getElementById("today").textContent = `✨ ${dayNames[todayEn] || todayEn} ✨`;

const blocks = [
    { type: "prep", label: "준비 시간", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "쉬는 시간", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "쉬는 시간", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "점심 시간", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", label: "쉬는 시간", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "쉬는 시간", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "업무 시간", start: "14:40", end: "16:30" }
];

const table = document.getElementById("scheduleTable");
const isWeekendView = (todayEn === "Saturday" || todayEn === "Sunday") || (todayEn === "Friday" && currentMinsTotal >= (16*60+30));

if (isWeekendView) {
  table.innerHTML = "<tr><td colspan='2' style='font-size:22px; padding:30px;'>🕯️ 평온한 주말 🕯️</td></tr>";
} else {
  let classIndex = 0;
  blocks.forEach((b) => {
    if (b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start; row.dataset.end = b.end;
    let p = document.createElement("td");
    let timeSpan = document.createElement("span");
    timeSpan.className = "periodTime"; timeSpan.textContent = `${b.start}-${b.end}`;
    p.appendChild(timeSpan); p.appendChild(document.createTextNode(b.label));
    let c = document.createElement("td");
    if (b.type === "class") {
        c.textContent = (schedule[todayEn] || [])[classIndex] || "-";
        classIndex++;
    } else if (b.type === "lunch") {
        c.innerHTML = '<span class="lunchText">맛있는 점심 🌿</span>';
    } else if (b.type === "prep") {
        c.textContent = b.label;
        c.classList.add("prepPeriod");
    }
    row.appendChild(p); row.appendChild(c);
    table.appendChild(row);
  });
}

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return parseInt(h)*60+parseInt(m);}

let pulseGlow = 0;
let pulseDir = 1;

function drawClock() {
    let now = new Date();
    let mins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
    
    ctx.clearRect(0, 0, 300, 300);
    ctx.beginPath(); ctx.arc(150, 150, 133, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();

    for (let i = 0; i < 60; i++) {
        let angle = i * Math.PI / 30; let isMajor = i % 5 === 0;
        let x1 = 150 + Math.cos(angle) * (125 - (isMajor?14:6)); let y1 = 150 + Math.sin(angle) * (125 - (isMajor?14:6));
        let x2 = 150 + Math.cos(angle) * 125; let y2 = 150 + Math.sin(angle) * 125;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = isMajor ? "#eaddcf" : "#f2e8df"; ctx.lineWidth = isMajor ? 4 : 2; ctx.stroke();
    }

    let label = "휴식 시간 ✨";
    let color = "#d1d1d1";
    let total = 0;
    let remain = 0;

    if (!isWeekendView) {
        let active = blocks.find(b => mins >= toMin(b.start) && mins < toMin(b.end));
        if (active) {
            label = active.label;
            color = active.type === "class" ? "#d35400" : (active.type === "prep" ? "#556b2f" : "#b07d05");
            total = toMin(active.end) - toMin(active.start);
            remain = toMin(active.end) - mins;
        } else {
            let nextBlock = blocks.find(b => mins < toMin(b.start));
            if (nextBlock) {
                label = "준비 시간 ✨"; color = "#8e9775";
                let lastBlock = [...blocks].reverse().find(b => mins >= toMin(b.end));
                let startOfGap = lastBlock ? toMin(lastBlock.end) : toMin("08:30");
                total = toMin(nextBlock.start) - startOfGap;
                remain = toMin(nextBlock.start) - mins;
            }
        }
    } else {
        // ================= VERIFIED WEEKEND COUNTDOWN =================
        color = "#a67c52";
        
        let target = new Date(now);
        let daysUntilMonday = (1 + 7 - now.getDay()) % 7;
        if (daysUntilMonday === 0 && now.getHours() >= 0) {
            daysUntilMonday = 7; 
        }
        target.setDate(now.getDate() + daysUntilMonday);
        target.setHours(0, 0, 0, 0); 
        
        let startOfWeekend = new Date(now);
        let daysSinceFriday = (now.getDay() + 2) % 7; 
        startOfWeekend.setDate(now.getDate() - daysSinceFriday);
        startOfWeekend.setHours(16, 30, 0, 0);

        let totalWeekendMs = target - startOfWeekend;
        let remainingMs = target - now;

        remain = Math.max(0, remainingMs / 60000);
        total = totalWeekendMs / 60000;

        let diffHrs = Math.floor(remainingMs / 3600000);
        let diffMins = Math.floor((remainingMs % 3600000) / 60000);
        
        if (remainingMs > 0) {
            label = `주말 남은 시간: ${diffHrs}시간 ${diffMins}분 🕊️`;
        } else {
            label = "월요일이 찾아왔어요! ✨";
        }
    }

    if (total > 0) {
        let percent = Math.max(0, Math.min(1, remain / total));
        pulseGlow += 0.3 * pulseDir; 
        if(pulseGlow > 10 || pulseGlow < 0) pulseDir *= -1;

        ctx.save();
        ctx.beginPath();
        ctx.arc(150, 150, 138, -Math.PI / 2, -Math.PI / 2 + (percent * 2 * Math.PI), false);
        ctx.lineWidth = 8; 
        ctx.strokeStyle = color; 
        ctx.lineCap = "round"; 
        ctx.shadowBlur = pulseGlow + 2; 
        ctx.shadowColor = color; 
        ctx.stroke();
        ctx.restore();
    }

    let h = now.getHours(); 
    let m = now.getMinutes().toString().padStart(2, "0");
    let s = now.getSeconds().toString().padStart(2, "0");
    let ampmText = h >= 12 ? "오후" : "오전"; 
    let hDisplay = h % 12 || 12;

    ctx.fillStyle = "#a67c52"; 
    ctx.font = "bold 32px Arial"; 
    ctx.textAlign = "center";
    ctx.fillText(`${hDisplay}:${m}:${s}`, 150, 150);
    
    ctx.font = "16px Arial";
    ctx.fillText(ampmText, 150, 175);

    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;

    document.querySelectorAll("#scheduleTable tr").forEach(row => {
        const start = row.dataset.start; const end = row.dataset.end;
        if (start && end) {
            row.classList.toggle("currentClass", (mins >= toMin(start) && mins < toMin(end)));
        }
    });
}
setInterval(drawClock, 50);

function startEmojiRain() {
  setInterval(() => {
    const cur = new Date(); const day = cur.getDay(); const hr = cur.getHours();
    const minsNow = hr * 60 + cur.getMinutes(); 
    let mode = "OFF";
    if (day === 5 && minsNow >= (16*60+30)) mode = "WEEKEND";
    else if (day === 6) mode = "WEEKEND";
    else if (day === 0) mode = (hr >= 21) ? "POO" : "WEEKEND";
    if (mode === "OFF") return;
    let emojis = ['☁️', '🕊️', '🌿', '🤍', '✨']; 
    if (mode === "POO") emojis = ['💩', '😭'];
    const e = document.createElement('div'); e.className = 'falling-emoji';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + 'vw'; e.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(e); setTimeout(() => e.remove(), 5000);
  }, 350);
}
startEmojiRain();

async function loadWeather(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}&units=metric`);
    const data=await res.json();
    currentCondition = data.weather[0].main; 
    document.getElementById("weather").textContent=`🌥날씨: ${data.main.temp.toFixed(1)}°C`;
}catch{ document.getElementById("weather").textContent="날씨 확인 불가 🕊️"; }
}
loadWeather();

async function loadAir(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}`);
    const data=await res.json();
    const levels=["좋음 😊","보통 🙂","그저그럼 😐","나쁨 😷","매우나쁨 ☠️"];
    document.getElementById("air").textContent=`😷미세먼지: ${levels[data.list[0].main.aqi-1]}`;
}catch{ document.getElementById("air").textContent="미세먼지 확인 불가 😷"; }
}
loadAir();

const weekPopup=document.getElementById("weekPopup");
document.getElementById("today").onclick=()=>{ weekPopup.style.display="flex"; }
weekPopup.onclick=()=>{ weekPopup.style.display="none"; }
</script>
</body>
</html>
